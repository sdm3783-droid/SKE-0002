<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>언제오시나?</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        /* ── 리셋 ── */
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        /* ── 기본 ── */
        body {
            font-family: -apple-system, 'Pretendard', 'Noto Sans KR', 'Segoe UI', sans-serif;
            background: #FAFAF9;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
        }

        /* ── 탭바 ── */
        .tabbar {
            display: flex;
            gap: 4px;
            background: #ffffff;
            border-bottom: 1px solid #e8e6e1;
            padding: 0 20px;
            position: sticky;
            top: 54px;
            z-index: 49;
            overflow-x: auto;
        }
        .tab-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            padding: 10px 14px;
            font-size: 13px;
            font-weight: 600;
            color: #6b7280;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .tab-btn svg, .card-header svg { width: 14px; height: 14px; flex-shrink: 0; }
        .tab-btn:hover { color: #1f2937; }
        .tab-btn.active { color: #D4A017; border-bottom-color: #D4A017; }

        /* ── 패널 ── */
        .panel { display: none; flex-direction: column; gap: 12px; }
        .panel.active { display: flex; }

        /* ── 메인 영역 ── */
        .app-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ── 탑바 ── */
        .topbar {
            height: 54px;
            background: #ffffff;
            border-bottom: 1px solid #e8e6e1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 10px;
            position: sticky; top: 0;
            z-index: 50;
            flex-shrink: 0;
        }
        .topbar-title {
            font-size: 15px;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.3px;
        }
        .live-badge {
            display: flex; align-items: center; gap: 5px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 20px;
            padding: 3px 9px;
            font-size: 10px;
            color: #16a34a;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .live-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: #22c55e;
            animation: livePulse 1.5s infinite;
        }
        @keyframes livePulse { 0%,100%{opacity:1} 50%{opacity:0.35} }
        .topbar-right {
            margin-left: auto;
            display: flex; align-items: center; gap: 8px;
        }
        #monthLabel {
            font-size: 13px;
            color: #475569;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
        }
        .nav-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 7px;
            padding: 5px 11px;
            font-size: 12px;
            color: #64748b;
            cursor: pointer;
            transition: all 0.15s;
        }
        .nav-btn:hover { background: #f1f5f9; color: #334155; }

        /* ── 콘텐츠 ── */
        .content {
            flex: 1;
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── KPI 타일 ── */
        .kpi-tiles {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        .kpi-tiles-sm { grid-template-columns: repeat(2, 1fr); margin-bottom: 12px; }
        .kpi-tile {
            background: #ffffff;
            border: 1px solid #e8e6e1;
            border-radius: 10px;
            padding: 14px 16px;
        }
        .kpi-label {
            font-size: 10px;
            font-weight: 600;
            color: #6b7280;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .kpi-value {
            font-size: 26px;
            font-weight: 800;
            color: #1f2937;
        }
        .kpi-value .kpi-unit {
            font-size: 12px;
            font-weight: 600;
            color: #6b7280;
            margin-left: 3px;
        }
        .kpi-value.kpi-warn   { color: #DC2626; }
        .kpi-value.kpi-danger { color: #EA580C; }

        /* ── 대시보드 상단(프로필 + 타임라인) ── */
        .dash-top-grid {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 12px;
        }
        .profile-card .card-body {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-align: center;
        }
        .profile-avatar-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
        .profile-avatar-btn {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: 2px solid transparent;
            display: flex; align-items: center; justify-content: center;
            color: #ffffff; font-size: 12px; font-weight: 700;
            cursor: pointer;
        }
        .profile-avatar-btn.active { border-color: #1f2937; }
        .profile-avatar-big {
            width: 56px; height: 56px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: #ffffff; font-size: 22px; font-weight: 700;
            margin-top: 4px;
        }
        .profile-name { font-size: 16px; font-weight: 700; color: #1f2937; }
        .profile-times { font-size: 12px; color: #6b7280; line-height: 1.6; }
        .profile-actions { display: flex; gap: 8px; width: 100%; margin-top: 4px; }
        .profile-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #D4A017;
            background: #FFF7E0;
            color: #B8860B;
            font-weight: 700;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }
        .profile-btn:hover { background: #FDF0C0; }
        .profile-btn.out { border-color: #DC2626; background: #FEF2F2; color: #DC2626; }
        .profile-btn.out:hover { background: #FEE2E2; }
        .profile-eval-link { font-size: 11px; color: #6b7280; text-decoration: underline; cursor: pointer; margin-top: 2px; }

        .timeline-legend { display: flex; gap: 14px; font-size: 11px; color: #6b7280; margin-bottom: 10px; }
        .timeline-legend span { display: inline-flex; align-items: center; gap: 4px; }
        .legend-dot { width: 8px; height: 8px; border-radius: 2px; display: inline-block; }
        .timeline-hours { display: flex; justify-content: space-between; font-size: 9px; color: #9ca3af; padding: 0 2px; margin-bottom: 6px; }
        .timeline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .timeline-row:last-child { margin-bottom: 0; }
        .timeline-row-name { width: 24px; flex-shrink: 0; font-size: 12px; font-weight: 700; color: #1f2937; cursor: pointer; }
        .timeline-track { position: relative; flex: 1; height: 20px; background: #F5F3EC; border-radius: 4px; overflow: hidden; }
        .timeline-block { position: absolute; top: 0; bottom: 0; border-radius: 3px; }
        .timeline-block.work    { background: #D4A017; }
        .timeline-block.outing  { background: #E85D5D; }
        .timeline-block.absence { background: #EA580C; opacity: 0.85; }
        .timeline-empty { font-size: 10px; color: #c4c0b6; padding-left: 2px; }

        /* ── 대시보드 하단(요약 3분할) ── */
        .dash-bottom-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .progress-row { margin-bottom: 12px; }
        .progress-row:last-child { margin-bottom: 0; }
        .progress-label { display: flex; justify-content: space-between; font-size: 11px; color: #6b7280; margin-bottom: 4px; }
        .progress-label b { color: #1f2937; }
        .progress-track { height: 8px; background: #F0EEE7; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #D4A017; border-radius: 4px; }
        .progress-fill.danger { background: #EA580C; }
        .count-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #F0EEE7; font-size: 12px; color: #6b7280; }
        .count-row:last-child { border-bottom: none; padding-bottom: 0; }
        .count-row b { font-size: 16px; color: #1f2937; }
        .recent-list { display: flex; flex-direction: column; gap: 8px; }
        .recent-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #6b7280; }
        .recent-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        .recent-dot.ok      { background: #22c55e; }
        .recent-dot.late    { background: #DC2626; }
        .recent-dot.absence { background: #EA580C; }
        .recent-date { color: #9ca3af; font-size: 11px; min-width: 66px; }
        .recent-name { font-weight: 700; color: #1f2937; min-width: 18px; }
        @media (max-width: 900px) {
            .dash-top-grid { grid-template-columns: 1fr; }
            .dash-bottom-grid { grid-template-columns: 1fr; }
        }

        /* ── 공통 카드 ── */
        .glass-card {
            background: #ffffff;
            border: 1px solid #e8e6e1;
            border-radius: 10px;
            overflow: hidden;
        }
        .card-header {
            padding: 11px 16px 10px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 10px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: flex; align-items: center; gap: 7px;
        }
        .card-body { padding: 12px 14px; }

        /* ── 달력 ── */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            padding: 6px 8px 8px;
        }
        .cal-dow {
            text-align: center;
            font-size: 9px;
            font-weight: 600;
            color: #94a3b8;
            padding: 3px 0 5px;
            letter-spacing: 0.5px;
        }
        .calendar-day {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 4px;
            gap: 2px;
            font-size: 11px;
            border-radius: 7px;
            cursor: pointer;
            color: #475569;
            position: relative;
            transition: all 0.15s;
            border: 1px solid transparent;
            font-weight: 500;
            overflow: hidden;
        }
        .calendar-day:hover { background: #f1f5f9; color: #1e293b; }
        .calendar-day.sun { color: #ef4444; }
        .calendar-day.sat { color: #3b82f6; }
        .calendar-day.has-record { color: #1e293b; font-weight: 700; }
        .calendar-day.today {
            background: #FFF7E0;
            border-color: #E8C547;
            color: #D4A017 !important;
            font-weight: 700;
        }
        .calendar-day.selected {
            background: #D4A017 !important;
            border-color: #D4A017 !important;
            color: #ffffff !important;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(212,160,23,0.3);
        }
        /* 아바타 스택 */
        .cal-avatars {
            display: flex;
            align-items: center;
        }
        .cal-avatar {
            width: 12px; height: 12px;
            border-radius: 50%;
            font-size: 6px;
            font-weight: 700;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            border: 1px solid #fff;
            margin-left: -3px;
            flex-shrink: 0;
        }
        .cal-avatar:first-child { margin-left: 0; }
        .cal-avatar-more {
            background: #e2e8f0;
            color: #64748b;
            font-size: 5px;
            font-weight: 700;
        }

        /* ── 기록 테이블 ── */
        .table-scroll { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        th {
            font-size: 9px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-align: left;
            padding: 6px 10px 8px;
            border-bottom: 1px solid #f1f5f9;
            white-space: nowrap;
            background: #fafafa;
        }
        td {
            padding: 9px 10px;
            font-size: 11px;
            color: #64748b;
            border-bottom: 1px solid #f8fafc;
            vertical-align: middle;
        }
        tbody tr { cursor: pointer; transition: background 0.1s; }
        tbody tr:hover td { background: #f8fafc; }
        .late-text { color: #ef4444; font-weight: 600; }
        .late-detail { line-height: 1.6; }
        .late-detail .d-min  { color: #ef4444; font-weight: 600; }
        .late-detail .d-hour { color: #94a3b8; font-size: 10px; }
        .late-detail .d-day  { color: #f59e0b; font-size: 10px; font-weight: 600; }
        .btn-del {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
            border-radius: 5px;
            padding: 3px 8px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 600;
            transition: all 0.15s;
        }
        .btn-del:hover { background: #fee2e2; }
        .td-notes { cursor: text; min-width: 70px; }
        .td-notes:hover { color: #334155; }
        .td-notes input {
            width: 100%;
            background: #ffffff;
            border: 1px solid #D4A017;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 11px;
            color: #1e293b;
            outline: none;
            font-family: inherit;
        }
        .badge-absence {
            display: inline-block;
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #ef4444;
            font-size: 9px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 3px;
            vertical-align: middle;
        }

        /* ── 입력 폼 ── */
        .form-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: #94a3b8;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .form-group { margin-bottom: 12px; }

        /* 직원 칩 */
        .person-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 12px;
        }
        .person-btn {
            padding: 5px 11px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            color: #64748b;
            transition: all 0.2s;
            font-family: inherit;
        }
        .person-btn:hover { background: #f1f5f9; color: #334155; border-color: #cbd5e1; }
        .person-btn.active {
            background: #FFF7E0;
            border-color: #E8C547;
            color: #D4A017;
        }

        /* 선택된 날짜 */
        .selected-date-label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 10px;
        }
        #viewDate { color: #D4A017; font-weight: 600; }

        /* 무단결근 */
        .absence-check-wrap {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 12px;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 9px;
            margin-bottom: 10px;
        }
        .absence-check-wrap input[type=checkbox] {
            width: 15px; height: 15px;
            accent-color: #ef4444;
            cursor: pointer;
            flex-shrink: 0;
        }
        .absence-check-wrap label {
            font-size: 11px;
            font-weight: 600;
            color: #ef4444;
            cursor: pointer;
            user-select: none;
        }

        /* 시간 박스 */
        .time-box {
            border: 1px solid #F5E6B8;
            border-radius: 10px;
            padding: 10px;
            background: #FFFBEB;
            margin-bottom: 10px;
        }
        .time-box.disabled { opacity: 0.4; pointer-events: none; }
        .time-row { display: flex; gap: 6px; margin-bottom: 6px; }
        .time-input-group { flex: 1; }
        .time-input-group label {
            display: block;
            font-size: 10px;
            color: #94a3b8;
            margin-bottom: 3px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .time-input-group input[type="time"] {
            width: 100%;
            padding: 7px 8px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 7px;
            font-size: 12px;
            color: #1e293b;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
            text-align: center;
        }
        .time-input-group input[type="time"]:focus {
            border-color: #E8C547;
            box-shadow: 0 0 0 3px rgba(212,160,23,0.1);
        }
        .input-error {
            border-color: #fca5a5 !important;
            background: #fef2f2 !important;
        }
        .error-msg { color: #ef4444; font-size: 10px; margin-top: 4px; }

        /* 외출 행 */
        .outing-row {
            display: flex; gap: 5px; align-items: flex-end; margin-bottom: 5px;
        }
        .outing-row .time-input-group { flex: 1; }
        .btn-remove-outing {
            background: #fef2f2;
            color: #ef4444;
            border: 1px solid #fecaca;
            border-radius: 7px;
            padding: 7px 8px;
            cursor: pointer;
            font-size: 11px;
            align-self: flex-end;
            transition: all 0.15s;
            font-family: inherit;
        }
        .btn-remove-outing:hover { background: #fee2e2; }
        .btn-add-outing {
            width: 100%;
            padding: 7px;
            background: #ffffff;
            border: 1px dashed #E8C547;
            border-radius: 7px;
            color: #C8860D;
            font-size: 11px;
            cursor: pointer;
            margin-top: 2px;
            font-family: inherit;
            transition: all 0.15s;
        }
        .btn-add-outing:hover { background: #FFF7E0; border-color: #E8C547; color: #D4A017; }

        /* 비고 */
        textarea {
            width: 100%;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 12px;
            color: #1e293b;
            resize: vertical;
            outline: none;
            font-family: inherit;
            transition: all 0.2s;
        }
        textarea:focus {
            border-color: #E8C547;
            box-shadow: 0 0 0 3px rgba(212,160,23,0.1);
        }

        /* 저장 버튼 */
        .btn-save {
            width: 100%;
            padding: 10px;
            background: #D4A017;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            font-family: inherit;
            margin-top: 10px;
            box-shadow: 0 2px 8px rgba(212,160,23,0.3);
        }
        .btn-save:hover {
            background: #B8860B;
            box-shadow: 0 4px 16px rgba(212,160,23,0.4);
        }

        /* ── 통계 ── */
        .unit-toggle {
            display: flex; gap: 5px; margin-bottom: 12px;
        }
        .unit-btn {
            padding: 4px 10px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            background: #f8fafc;
            color: #94a3b8;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.15s;
            font-family: inherit;
        }
        .unit-btn.active {
            background: #FFF7E0;
            border-color: #E8C547;
            color: #D4A017;
            font-weight: 600;
        }
        #curFilter {
            font-size: 10px;
            color: #ef4444;
            font-weight: 600;
            margin-left: 4px;
        }
        /* summaryBox: JS 호환성 유지 (숨김) */
        .summary-grid { display: none; }
        .summary-card { display: none; }

        /* CSS 바 차트 */
        .css-bar-chart {
            display: flex; flex-direction: row; align-items: flex-end;
            gap: 8px; height: 160px; padding: 0 4px 0;
        }
        .css-bar-item {
            display: flex; flex-direction: column; align-items: center;
            justify-content: flex-end; flex: 1; height: 100%; cursor: pointer;
        }
        .css-bar-val {
            font-size: 10px; color: #94a3b8; margin-bottom: 4px;
            text-align: center; white-space: nowrap;
        }
        .css-bar-track {
            width: 100%; background: #f1f5f9; border-radius: 6px 6px 0 0;
            overflow: hidden; display: flex; align-items: flex-end;
        }
        .css-bar-fill {
            width: 100%; border-radius: 6px 6px 0 0;
            transition: height 0.5s cubic-bezier(.4,0,.2,1);
        }
        .css-bar-name {
            font-size: 11px; color: #64748b; font-weight: 600;
            margin-top: 6px; text-align: center; cursor: pointer;
            transition: color 0.15s;
        }
        .css-bar-name:hover { color: #D4A017; }
        .bar-active .css-bar-name { color: #D4A017 !important; }
        .bar-active .css-bar-val  { color: #D4A017 !important; }

        /* ── 토스트 ── */
        .toast {
            position: fixed;
            bottom: 24px; left: 50%;
            transform: translateX(-50%) translateY(50px);
            background: #1e293b;
            color: #f8fafc;

            display: none;
            position: fixed;
            inset: 0;

            border-radius: 14px;

            font-weight: 700;
            flex-shrink: 0;
            color: #ffffff;

        .modal-name { font-size: 18px; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
        .modal-sub  { font-size: 12px; color: #94a3b8; }
        .modal-grade-badge {

        .history-min.zero { color: #22c55e; }
        .modal-empty { text-align:center; color:#cbd5e1; padding:24px; font-size:13px; }
        .modal-footer {

            border-top: 1px solid #f1f5f9;

            position: fixed;
            inset: 0;

            padding: 16px;
            backdrop-filter: blur(4px);

        <button class="tab-btn" data-target="section-stats" onclick="navTo('section-stats', this)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg> 통계</button>

    <!-- 콘텐츠 -->
    <div class="content">

        <!-- 대시보드 패널 -->
        <div class="panel active" id="panel-dashboard">
            <div class="dash-top-grid">
                <div class="glass-card profile-card">
                    <div class="card-header"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> 오늘 현황</div>
                    <div class="card-body" id="profileCard"></div>

                            <span><span class="legend-dot" style="background:#E85D5D"></span>외출</span>

                    <div class="card-body" id="dashRecent"></div>

                    <div class="kpi-tiles kpi-tiles-sm" id="statsKpis"></div>
                    <div id="cssBarChart" class="css-bar-chart"></div>

</div><!-- /app-main -->

<script>
    // ──────────────────────────────────────────────────
    // 날짜 기록 모달
    // ──────────────────────────────────────────────────
    function openDayModal(dateStr) {
        const dayRecords = allRecords
            .filter(r => r.date === dateStr)
            .sort((a, b) => a.person.localeCompare(b.person));

        const parts = dateStr.split('-');
        const y = parts[0], m = parts[1], d = parts[2];
        const dow = ['일','월','화','수','목','금','토'][new Date(dateStr).getDay()];

    function timeToMinutes(timeStr) {
        if (!timeStr) return 0;
        const [h, m] = timeStr.split(':').map(Number);
        return h * 60 + m;
    }

    function getRecordOutings(record) {
        if (record.outings && record.outings.length) return record.outings;
        if (record.outTime) return [{ out: record.outTime, ret: record.returnTime || '' }];
        return [];
    }

    const WORK_MINS_PER_DAY = 480;

    function setUnit(unit) {
        curUnit = unit;
        ['min','hour','day'].forEach(u => {

    function calcDisplay(totalMin) {
        const h = Math.floor(totalMin / 60);
        const m = totalMin % 60;
        const hourStr = h > 0 ? `${h}시간 ${m}분` : `${m}분`;
        const day = (totalMin / WORK_MINS_PER_DAY).toFixed(2);
        const chartVal = curUnit === 'min'  ? totalMin
                       : curUnit === 'hour' ? +(totalMin / 60).toFixed(2)
                       :                     +(totalMin / WORK_MINS_PER_DAY).toFixed(2);
        const chartLabel = curUnit === 'min'  ? `${totalMin}분`
                         : curUnit === 'hour' ? `${hourStr}`
                         :                     `${day}일`;
        return { totalMin, hourStr, day, chartVal, chartLabel };
    }

    function escHtml(str) {

            .replace(/&/g, '&amp;')

            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

    const TIMELINE_START = 7 * 60;
    const TIMELINE_END = 19 * 60;
    const TIMELINE_RANGE = TIMELINE_END - TIMELINE_START;

    function timelinePct(minutes) {
        return Math.max(0, Math.min(100, ((minutes - TIMELINE_START) / TIMELINE_RANGE) * 100));
    }

    function renderTimeline() {
        const container = document.getElementById('timelineRows');
        if (!container) return;
        const todayStr = todayDateStr();
        const now = new Date();
        const nowMin = now.getHours() * 60 + now.getMinutes();

        container.innerHTML = users.map(u => {
            const rec = allRecords.find(r => r.date === todayStr && r.person === u);
            if (!rec) {
                return `
                    <div class="timeline-row">
                        <div class="timeline-row-name" onclick="openModal('${escHtml(u)}')">${escHtml(u)}</div>
                        <div class="timeline-track"><span class="timeline-empty">기록 없음</span></div>
                    </div>
                `;
            }
            if (rec.absenceType === 'unauthorized') {
                return `
                    <div class="timeline-row">
                        <div class="timeline-row-name" onclick="openModal('${escHtml(u)}')">${escHtml(u)}</div>
                        <div class="timeline-track"><div class="timeline-block absence" style="left:0%;width:100%;"></div></div>
                    </div>
                `;
            }
            let blocks = '';
            if (rec.startTime) {
                const startMin = timeToMinutes(rec.startTime);
                const endMin = rec.endTime ? timeToMinutes(rec.endTime) : nowMin;
                const left = timelinePct(startMin);
                const width = Math.max(1, timelinePct(endMin) - left);
                blocks += `<div class="timeline-block work" style="left:${left}%;width:${width}%;"></div>`;
            }
            getRecordOutings(rec).forEach(o => {
                if (!o.out) return;
                const outMin = timeToMinutes(o.out);
                const retMin = o.ret ? timeToMinutes(o.ret) : nowMin;
                const left = timelinePct(outMin);
                const width = Math.max(1, timelinePct(retMin) - left);
                blocks += `<div class="timeline-block outing" style="left:${left}%;width:${width}%;"></div>`;
            });
            return `
                <div class="timeline-row">
                    <div class="timeline-row-name" onclick="openModal('${escHtml(u)}')">${escHtml(u)}</div>
                    <div class="timeline-track">${blocks}</div>
                </div>
            `;
        }).join('');
    }

        container.innerHTML = `

        }
        container.innerHTML = `<div class="recent-list">${recent.map(r => {
            const dotClass = r.absenceType === 'unauthorized' ? 'absence' : ((r.lateMinutes || 0) > 0 ? 'late' : 'ok');
            return `
                <div class="recent-row">
                    <span class="recent-dot ${dotClass}"></span>
                    <span class="recent-date">${r.date}</span>
                    <span class="recent-name">${escHtml(r.person)}</span>
                </div>
            `;
        }).join('')}</div>`;
    }

    // ──────────────────────────────────────────────────
    // 달력 렌더링
    // ──────────────────────────────────────────────────
    function renderCalendar() {
        const y = curDate.getFullYear();
        const m = curDate.getMonth();
        document.getElementById('monthLabel').textContent = `${y}년 ${m + 1}월`;

        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';

        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

        ['일', '월', '화', '수', '목', '금', '토'].forEach(d => {
            const header = document.createElement('div');
            header.className = 'cal-dow';
            header.textContent = d;
            header.setAttribute('role', 'columnheader');
            grid.appendChild(header);
        });

        const firstDow = new Date(y, m, 1).getDay();
        const lastDay = new Date(y, m + 1, 0).getDate();

        for (let i = 0; i < firstDow; i++) {
            grid.appendChild(document.createElement('div'));
        }

        for (let day = 1; day <= lastDay; day++) {
            const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const hasRecord = allRecords.some(r => r.date === dateStr);
            const dow = new Date(y, m, day).getDay();

            // 해당 날짜에 기록된 직원 목록
            const dayPersons = hasRecord
                ? users.filter(u => allRecords.some(r => r.date === dateStr && r.person === u))
                : [];

            const cell = document.createElement('div');
            cell.className = 'calendar-day';
            if (hasRecord) cell.classList.add('has-record');
            if (dow === 0) cell.classList.add('sun');
            if (dow === 6) cell.classList.add('sat');
            if (dateStr === todayStr) cell.classList.add('today');
            if (selDate === dateStr) cell.classList.add('selected');
            cell.setAttribute('role', 'gridcell');
            cell.setAttribute('aria-label', `${m + 1}월 ${day}일${hasRecord ? ` (기록 ${dayPersons.length}명)` : ''}`);
            cell.setAttribute('tabindex', '0');

            // 날짜 숫자
            const dayNum = document.createElement('span');
            dayNum.textContent = day;
            cell.appendChild(dayNum);

            // 아바타 스택 (기록 있는 날만)
            if (hasRecord && dayPersons.length > 0) {
                const stack = document.createElement('div');
                stack.className = 'cal-avatars';
                const MAX_SHOW = 3;
                dayPersons.slice(0, MAX_SHOW).forEach(u => {
                    const av = document.createElement('span');
                    av.className = 'cal-avatar';
                    av.style.background = AVATAR_COLORS[users.indexOf(u) % AVATAR_COLORS.length];
                    av.textContent = u.charAt(0);
                    stack.appendChild(av);
                });
                if (dayPersons.length > MAX_SHOW) {
                    const more = document.createElement('span');
                    more.className = 'cal-avatar cal-avatar-more';
                    more.textContent = `+${dayPersons.length - MAX_SHOW}`;
                    stack.appendChild(more);
                }
                cell.appendChild(stack);
            }

            cell.addEventListener('click', () => {
                if (hasRecord) {
                    openDayModal(dateStr);
                } else {
                    selectDate(dateStr);
                }
            });
            cell.addEventListener('keydown', e => {
                if (e.key === 'Enter' || e.key === ' ') {
                    hasRecord ? openDayModal(dateStr) : selectDate(dateStr);
                }
            });

            grid.appendChild(cell);
        }
    }

    function selectDate(dateStr) {
        selDate = dateStr;
        document.getElementById('viewDate').textContent = dateStr;
        refresh();
        loadDetail();
    }

    // ──────────────────────────────────────────────────
    // 저장
    // ──────────────────────────────────────────────────
    function doSave() {
        if (!selDate || !selPerson) {
            showToast('날짜와 직원을 선택하세요!');
            return;
        }

        const isAbsence = document.getElementById('chkAbsence').checked;
        const errEl = document.getElementById('timeError');
        errEl.textContent = '';

        let missMinutes = 0;
        let saveData = {
            date: selDate,
            person: selPerson,
            notes: document.getElementById('memo').value
        };

        if (isAbsence) {
            missMinutes = 480;
            saveData = { ...saveData, absenceType: 'unauthorized', startTime: '', endTime: '', outings: [], lateMinutes: 480 };
        } else {
            const s = document.getElementById('st').value;
            const e = document.getElementById('et').value;

            ['st', 'et'].forEach(id => document.getElementById(id).classList.remove('input-error'));
            document.querySelectorAll('.outing-out, .outing-ret').forEach(el => el.classList.remove('input-error'));

            if (s && e && timeToMinutes(s) >= timeToMinutes(e)) {
                document.getElementById('st').classList.add('input-error');
                document.getElementById('et').classList.add('input-error');
                errEl.textContent = '퇴근 시간이 출근 시간보다 빠를 수 없습니다.';
                return;
            }

            const rows = document.querySelectorAll('#outingsContainer .outing-row');
            for (let i = 0; i < rows.length; i++) {
                const oEl = rows[i].querySelector('.outing-out');
                const rEl = rows[i].querySelector('.outing-ret');
                const o = oEl.value, r = rEl.value;
                // 외출만 입력 허용 — 복귀 시간은 나중에 추가 가능
                if (!o && r) { oEl.classList.add('input-error'); errEl.textContent = `외출 ${i+1}: 외출 시간을 입력해주세요.`; return; }
                if (o && r && timeToMinutes(o) >= timeToMinutes(r)) {
                    oEl.classList.add('input-error'); rEl.classList.add('input-error');
                    errEl.textContent = `외출 ${i+1}: 복귀 시간이 외출 시간보다 빠를 수 없습니다.`; return;
                }
            }

            if (s && timeToMinutes(s) > 510) missMinutes += (timeToMinutes(s) - 510);
            if (e && timeToMinutes(e) < 1050) missMinutes += (1050 - timeToMinutes(e));

            const outings = getOutingsFromDOM();
            outings.forEach(({ out, ret }) => {
                if (out && ret) {
                    const oMin = timeToMinutes(out), rMin = timeToMinutes(ret);
                    const lunchOverlap = Math.max(0, Math.min(rMin, 810) - Math.max(oMin, 750));
                    missMinutes += (rMin - oMin) - lunchOverlap;
                }
            });

            saveData = { ...saveData, absenceType: '', startTime: s, endTime: e, outings: outings.length ? outings : [], lateMinutes: missMinutes };
        }

        db.ref(`attendance/${selPerson}/${selDate}`).set(saveData).then(() => {
            showToast('저장되었습니다.');
            resetForm();
        }).catch(() => {
            showToast('저장 중 오류가 발생했습니다. 다시 시도해주세요.');
        });
    }

    function resetForm() {
        document.getElementById('chkAbsence').checked = false;
        document.getElementById('timeBox').classList.remove('disabled');
        ['st', 'et'].forEach(id => {
            const el = document.getElementById(id);
            el.value = '';
            el.classList.remove('input-error');
        });
        document.getElementById('outingsContainer').innerHTML = '';
        addOutingRow();
        document.getElementById('memo').value = '';
        document.getElementById('timeError').textContent = '';
        selDate = null;
        selPerson = '';
        document.getElementById('viewDate').textContent = '날짜 선택';
        updatePersonUI();
        refresh();
    }

    // ──────────────────────────────────────────────────
    // 통계 렌더링 (CSS 바 차트)
    // ──────────────────────────────────────────────────
    function renderStats() {
        const totals = users.map(u =>
            allRecords.filter(r => r.person === u).reduce((acc, cur) => acc + (cur.lateMinutes || 0), 0)
        );

        // 통계 KPI 타일 (전체 이탈시간 합계 / 무단결근 총 건수)
        const grandTotal = totals.reduce((a, b) => a + b, 0);
        const absenceCount = allRecords.filter(r => r.absenceType === 'unauthorized').length;
        const statsKpis = document.getElementById('statsKpis');
        if (statsKpis) {
            statsKpis.innerHTML = `
                <div class="kpi-tile">
                    <div class="kpi-label">전체 이탈시간 합계</div>
                    <div class="kpi-value">${calcDisplay(grandTotal).chartLabel}</div>
                </div>
                <div class="kpi-tile">
                    <div class="kpi-label">무단결근 총 건수</div>
                    <div class="kpi-value kpi-danger">${absenceCount}<span class="kpi-unit">건</span></div>
                </div>
            `;
        }

        // summaryBox: JS 호환성 유지 (숨김 상태로 채움)
        const summaryBox = document.getElementById('summaryBox');
        summaryBox.innerHTML = '';
        users.forEach((u, i) => {
            const d = calcDisplay(totals[i]);
            const card = document.createElement('div');
            card.className = 'summary-card' + (filterName === u ? ' active' : '');
            card.setAttribute('aria-pressed', String(filterName === u));
            card.setAttribute('aria-label', `${u} ${d.totalMin}분`);
            card.addEventListener('click', () => setFilter(u));
            summaryBox.appendChild(card);
        });

        // CSS 바 차트 (이탈시간 높은 순 정렬)
        const sortedUsers = users.map((u, i) => ({ u, total: totals[i] }))
            .sort((a, b) => b.total - a.total);
        const maxVal = Math.max(...totals, 1);
        const chart = document.getElementById('cssBarChart');
        chart.innerHTML = '';

        sortedUsers.forEach(({ u, total: userTotal }) => {
            const i = users.indexOf(u);
            const d = calcDisplay(totals[i]);
            const pct = (userTotal / maxVal) * 100;
            const isActive = filterName === u;
            const ratio = userTotal / maxVal;

            const color = AVATAR_COLORS[users.indexOf(u) % AVATAR_COLORS.length];
            const fillStyle = `background:${color};`;

            const barHeight = userTotal === 0 ? 0 : Math.max(pct, 4);

            const item = document.createElement('div');
            item.className = 'css-bar-item' + (isActive ? ' bar-active' : '');
            item.onclick = () => setFilter(u);
            item.innerHTML = `
                <span class="css-bar-val">${d.chartLabel}</span>
                <div class="css-bar-track" style="height:${barHeight.toFixed(1)}%;">
                    <div class="css-bar-fill" style="height:100%;${fillStyle}"></div>
                </div>
                <span class="css-bar-name" onclick="event.stopPropagation();openModal('${escHtml(u)}')" title="${escHtml(u)} 평가 보기">${escHtml(u)}</span>
            `;
            chart.appendChild(item);
        });
    }

    function setFilter(name) {
        filterName = (filterName === name) ? '' : name;
        document.getElementById('curFilter').textContent = filterName ? `(${filterName} 필터)` : '';
        renderStats();
        renderTable();
    }

    // ──────────────────────────────────────────────────
    // 기록 목록 렌더링
    // ──────────────────────────────────────────────────
    function renderTable() {
        const target = filterName
            ? allRecords.filter(r => r.person === filterName)
            : allRecords;

        const sorted = target.slice().sort((a, b) => b.date.localeCompare(a.date));
        const tbody = document.getElementById('listBody');
        tbody.innerHTML = '';

        sorted.forEach(r => {
            const tr = document.createElement('tr');
            tr.dataset.date = r.date;
            tr.dataset.person = r.person;

            const totalMin = r.lateMinutes || 0;
            const d = calcDisplay(totalMin);
            const isAbsence = r.absenceType === 'unauthorized';
            const outingsText = isAbsence
                ? '<span class="badge-absence">무단결근</span>'
                : (getRecordOutings(r)
                    .filter(o => o.out)
                    .map(o => `${escHtml(o.out)}~${escHtml(o.ret || '?')}`)
                    .join('<br>') || '-');
            const lateCell = totalMin > 0
                ? `<td class="late-detail">
                       <span class="d-min">${totalMin}분</span>${isAbsence ? ' <span class="badge-absence">무단결근</span>' : ''}<br>
                       <span class="d-hour">${d.hourStr}</span><br>
                       <span class="d-day">연차 ${d.day}일</span>
                   </td>`
                : `<td>-</td>`;
            tr.innerHTML = `
                <td>${escHtml(r.date)}</td>
                <td style="font-weight:600;color:#334155;">${escHtml(r.person)}</td>
                <td>${escHtml(r.startTime) || '-'}</td>
                <td>${escHtml(r.endTime) || '-'}</td>
                <td>${outingsText}</td>
                ${lateCell}
                <td class="td-notes" data-date="${escHtml(r.date)}" data-person="${escHtml(r.person)}" title="클릭하여 비고 수정">${escHtml(r.notes) || '<span style="color:#2a2a2a">메모</span>'}</td>
                <td><button class="btn-del" data-date="${escHtml(r.date)}" data-person="${escHtml(r.person)}" aria-label="${escHtml(r.date)} ${escHtml(r.person)} 기록 삭제">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function handleTableClick(e) {
        const delBtn = e.target.closest('.btn-del');
        if (delBtn) {
            e.stopPropagation();
            const { date, person } = delBtn.dataset;
            if (confirm(`[${person}] ${date} 기록을 삭제하시겠습니까?`)) {
                db.ref(`attendance/${person}/${date}`).remove()
                    .then(() => showToast('삭제되었습니다.'))
                    .catch(() => showToast('삭제 중 오류가 발생했습니다.'));
            }
            return;
        }

        const notesTd = e.target.closest('.td-notes');
        if (notesTd && !notesTd.querySelector('input')) {
            e.stopPropagation();
            const { date, person } = notesTd.dataset;
            const record = allRecords.find(x => x.date === date && x.person === person);
            const currentVal = record?.notes || '';

            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentVal;
            notesTd.innerHTML = '';
            notesTd.appendChild(input);
            input.focus();

            function saveNotes() {
                const newVal = input.value.trim();
                if (newVal === currentVal) { renderTable(); return; }
                db.ref(`attendance/${person}/${date}`).update({ notes: newVal })
                    .then(() => showToast('비고 저장됨'))
                    .catch(() => showToast('저장 오류'));
            }
            input.addEventListener('blur', saveNotes);
            input.addEventListener('keydown', e => {
                if (e.key === 'Enter') { input.blur(); }
                if (e.key === 'Escape') { renderTable(); }
            });
            return;
        }

        const row = e.target.closest('tr');
        if (row && row.dataset.date) {
            selDate = row.dataset.date;
            selPerson = row.dataset.person;
            document.getElementById('viewDate').textContent = selDate;
            updatePersonUI();
            loadDetail();
            refresh();
        }
    }

    // ──────────────────────────────────────────────────
    // 상세 데이터 로드
    // ──────────────────────────────────────────────────
    function loadDetail() {
        const record = allRecords.find(x => x.date === selDate && x.person === selPerson);

        const isAbsence = record?.absenceType === 'unauthorized';
        document.getElementById('chkAbsence').checked = isAbsence;
        document.getElementById('timeBox').classList.toggle('disabled', isAbsence);

        document.getElementById('st').value = record?.startTime || '';
        document.getElementById('et').value = record?.endTime || '';
        document.getElementById('memo').value = record?.notes || '';

        document.getElementById('outingsContainer').innerHTML = '';
        const outings = record ? getRecordOutings(record) : [];
        if (outings.length > 0) {
            outings.forEach(o => addOutingRow(o.out, o.ret));
        } else {
            addOutingRow();
        }

        document.getElementById('timeError').textContent = '';
        ['st', 'et'].forEach(id => document.getElementById(id).classList.remove('input-error'));
    }
</script>
