<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>언제오시나?</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }

        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px 10px; text-align: center; }
        .header h1 { font-size: 1.3rem; margin-bottom: 5px; }
        .header p { font-size: 0.8rem; opacity: 0.9; }

        .main-content { display: flex; flex-direction: column; gap: 15px; padding: 15px; }
        @media (min-width: 900px) {
            .main-content { display: grid; grid-template-columns: 1fr 1fr; }
            .full-width { grid-column: 1 / -1; }
        }

        .section { background: #fdfdfd; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .section h2 { color: #667eea; margin-bottom: 12px; font-size: 1.1rem; border-left: 4px solid #667eea; padding-left: 8px; }

        .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .calendar-header button { padding: 5px 10px; background: #667eea; color: white; border: none; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border: 1px solid #f0f0f0; border-radius: 5px; cursor: pointer; font-size: 0.8rem; font-weight: 600; background: white; }
        .calendar-day:hover { background: #f0f4ff; }
        .calendar-day.selected { background: #667eea !important; color: white !important; }
        .calendar-day.has-record { border-color: #ff6b6b; color: #ff6b6b; font-weight: bold; }
        .calendar-day.sun { color: #ff4757; }
        .calendar-day.sat { color: #3182ce; }

        .person-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 10px; }
        .person-btn { padding: 10px 5px; border: 1px solid #ddd; border-radius: 5px; background: white; font-size: 0.8rem; font-weight: bold; cursor: pointer; transition: background 0.15s; }
        .person-btn:hover { background: #f0f4ff; }
        .person-btn.active { background: #667eea; color: white; border-color: #667eea; }

        .time-box { border: 1px dashed #667eea; padding: 10px; border-radius: 10px; background: #f9faff; margin-bottom: 10px; }
        .time-row { display: flex; gap: 5px; margin-bottom: 5px; }
        .time-input-group { flex: 1; }
        .time-input-group label { display: block; font-size: 0.7rem; margin-bottom: 2px; color: #666; }
        .time-input-group input { width: 100%; padding: 6px; border: 1px solid #ccc; border-radius: 5px; font-size: 0.85rem; }

        textarea { width: 100%; border: 1px solid #ccc; border-radius: 5px; padding: 6px; font-size: 0.85rem; resize: vertical; }
        .btn-save { background: #667eea; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; margin-top: 10px; font-size: 1rem; transition: background 0.15s; }
        .btn-save:hover { background: #5568d3; }

        /* 저장 성공 토스트 메시지 */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: #323232; color: white; padding: 10px 20px; border-radius: 8px; font-size: 0.9rem; opacity: 0; transition: all 0.3s ease; z-index: 9999; pointer-events: none; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .chart-container { height: 180px; margin-bottom: 10px; }
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 5px; }
        .summary-card { background: white; padding: 8px; border-radius: 8px; border: 1px solid #eee; text-align: center; font-size: 0.8rem; cursor: pointer; transition: background 0.15s; }
        .summary-card:hover { background: #f0f4ff; }
        .summary-card.active { border-color: #667eea; background: #f0f4ff; }
        .summary-card .score-min { font-weight: bold; color: #667eea; font-size: 0.85rem; }
        .summary-card .score-hour { color: #888; font-size: 0.72rem; margin-top: 1px; }
        .summary-card .score-day { color: #ff6b35; font-size: 0.72rem; font-weight: bold; margin-top: 2px; }

        /* 단위 토글 버튼 */
        .unit-toggle { display: flex; gap: 5px; margin-bottom: 10px; }
        .unit-btn { padding: 4px 10px; border: 1px solid #667eea; border-radius: 20px; background: white; color: #667eea; font-size: 0.75rem; cursor: pointer; transition: all 0.15s; }
        .unit-btn.active { background: #667eea; color: white; }

        /* 테이블 이탈 셀 */
        .late-detail { line-height: 1.5; }
        .late-detail .d-min { color: #ff4757; font-weight: bold; }
        .late-detail .d-hour { color: #888; font-size: 0.7rem; }
        .late-detail .d-day { color: #ff6b35; font-size: 0.7rem; font-weight: bold; }

        .table-scroll { width: 100%; overflow-x: auto; margin-top: 10px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 8px; border-bottom: 1px solid #eee; text-align: left; font-size: 0.75rem; }
        th { background: #f4f4f4; color: #666; }
        tbody tr { cursor: pointer; transition: background 0.1s; }
        tbody tr:hover { background: #f9faff; }
        .late-text { color: #ff4757; font-weight: bold; }
        .btn-del { background: #ff4757; color: white; border: none; border-radius: 3px; padding: 3px 6px; cursor: pointer; font-size: 0.75rem; }
        .btn-del:hover { background: #e0001a; }
        .td-notes { cursor: text; min-width: 80px; }
        .td-notes:hover { background: #fffbe6; }
        .td-notes input { width: 100%; border: 1px solid #667eea; border-radius: 4px; padding: 3px 5px; font-size: 0.75rem; outline: none; }

        /* 유효성 검사 에러 표시 */
        .input-error { border-color: #ff4757 !important; }
        .error-msg { color: #ff4757; font-size: 0.72rem; margin-top: 3px; }

        /* 무단결근 */
        .absence-check-wrap { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; padding: 8px 10px; background: #fff5f5; border: 1px solid #ffcdd2; border-radius: 8px; }
        .absence-check-wrap input[type=checkbox] { width: 18px; height: 18px; accent-color: #ff4757; cursor: pointer; }
        .absence-check-wrap label { font-size: 0.9rem; font-weight: bold; color: #ff4757; cursor: pointer; user-select: none; }
        .time-box.disabled { opacity: 0.4; pointer-events: none; }
        .badge-absence { display: inline-block; background: #ff4757; color: white; font-size: 0.7rem; font-weight: bold; padding: 1px 6px; border-radius: 10px; margin-left: 4px; vertical-align: middle; }

        /* 다중 외출 행 */
        .outing-row { display: flex; gap: 5px; align-items: flex-end; margin-bottom: 5px; }
        .outing-row .time-input-group { flex: 1; }
        .btn-remove-outing { background: #ff4757; color: white; border: none; border-radius: 5px; padding: 6px 8px; cursor: pointer; font-size: 0.75rem; white-space: nowrap; align-self: flex-end; }
        .btn-remove-outing:hover { background: #e0001a; }
        .btn-add-outing { background: #f0f4ff; color: #667eea; border: 1px dashed #667eea; border-radius: 5px; padding: 6px 10px; cursor: pointer; font-size: 0.8rem; width: 100%; margin-top: 2px; }
        .btn-add-outing:hover { background: #e0e8ff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🕐 언제오시나?</h1>
            <p>8:30 출근 / 17:30 퇴근 / 점심시간(12:30~13:30) 자동 제외</p>
        </div>

        <div class="main-content">
            <div class="section" role="region" aria-label="달력">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)" aria-label="이전 달">◀ 이전</button>
                    <h2 id="monthLabel" style="border:none; margin:0; font-size:1rem;" aria-live="polite"></h2>
                    <button onclick="changeMonth(1)" aria-label="다음 달">다음 ▶</button>
                </div>
                <div id="calendarGrid" class="calendar-grid" role="grid" aria-label="날짜 선택"></div>
            </div>

            <div class="section" role="region" aria-label="근태 입력">
                <h2>⏰ 정보 입력</h2>
                <div id="personList" class="person-grid" role="group" aria-label="직원 선택"></div>
                <div style="margin-bottom:8px; font-size:0.85rem;">
                    날짜: <span id="viewDate" style="font-weight:bold; color:#667eea;" aria-live="polite">날짜 선택</span>
                </div>

                <div class="absence-check-wrap">
                    <input type="checkbox" id="chkAbsence" onchange="toggleAbsence()" aria-label="무단결근 여부">
                    <label for="chkAbsence">무단결근 (1일 연차 480분 자동 적용)</label>
                </div>
                <div class="time-box" id="timeBox">
                    <div class="time-row">
                        <div class="time-input-group">
                            <label for="st">출근</label>
                            <input type="time" id="st" aria-label="출근 시간">
                        </div>
                        <div class="time-input-group">
                            <label for="et">퇴근</label>
                            <input type="time" id="et" aria-label="퇴근 시간">
                        </div>
                    </div>
                    <div id="outingsContainer"></div>
                    <button type="button" class="btn-add-outing" onclick="addOutingRow()" aria-label="외출 추가">+ 외출 추가</button>
                    <div id="timeError" class="error-msg" role="alert" aria-live="assertive"></div>
                </div>
                <div>
                    <label for="memo" style="font-size:0.75rem; color:#666;">비고</label>
                    <textarea id="memo" rows="2" aria-label="비고"></textarea>
                </div>
                <button class="btn-save" onclick="doSave()" aria-label="저장하기">저장하기</button>
            </div>

            <div class="section full-width" role="region" aria-label="통계 및 기록">
                <h2>📊 인원별 이탈 시간</h2>
                <div class="unit-toggle" role="group" aria-label="표시 단위 선택">
                    <button class="unit-btn active" onclick="setUnit('min')"  id="unitMin">분</button>
                    <button class="unit-btn"        onclick="setUnit('hour')" id="unitHour">시간</button>
                    <button class="unit-btn"        onclick="setUnit('day')"  id="unitDay">일(연차)</button>
                </div>
                <div class="chart-container"><canvas id="barChart" role="img" aria-label="인원별 이탈 시간 막대 그래프"></canvas></div>
                <div id="summaryBox" class="summary-grid" role="group" aria-label="직원별 이탈 시간 필터"></div>

                <h2 style="margin-top:15px;">📝 기록 목록 <span id="curFilter" style="font-size:0.7rem; color:#ff4757;" aria-live="polite"></span></h2>
                <div class="table-scroll">
                    <table role="table" aria-label="근태 기록">
                        <thead>
                            <tr>
                                <th scope="col">날짜</th><th scope="col">직원</th><th scope="col">출근</th>
                                <th scope="col">퇴근</th><th scope="col">외출내역</th>
                                <th scope="col">지각/조퇴/외출</th><th scope="col">비고</th><th scope="col">삭제</th>
                            </tr>
                        </thead>
                        <tbody id="listBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- 토스트 알림 -->
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script>
        // ──────────────────────────────────────────────────
        // Firebase 설정
        // 보안: Firebase Console > Realtime Database > Rules 에서
        // 인증된 사용자만 읽기/쓰기 가능하도록 제한 권장
        // ──────────────────────────────────────────────────
        const firebaseConfig = {
            apiKey: "AIzaSyCkp4Odbptw0v9EdDqcVogv_pVoLNc2ef4",
            authDomain: "ske-0002.firebaseapp.com",
            databaseURL: "https://ske-0002-default-rtdb.firebaseio.com",
            projectId: "ske-0002",
            storageBucket: "ske-0002.firebasestorage.app",
            messagingSenderId: "554932618834",
            appId: "1:554932618834:web:a90d739bedabd71424c18b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ──────────────────────────────────────────────────
        // 상태 변수
        // ──────────────────────────────────────────────────
        let allRecords = [];
        let curDate = new Date();
        let selDate = null;
        let selPerson = '';
        let filterName = '';
        let chartObj = null;
        let dbListener = null;

        const users = ['박', '이', '1째', '2째', '송프리'];

        // ──────────────────────────────────────────────────
        // 유틸리티
        // ──────────────────────────────────────────────────

        // 시간 문자열(HH:MM)을 분 단위 정수로 변환
        function timeToMinutes(timeStr) {
            if (!timeStr) return 0;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        // 구 형식(outTime/returnTime) 또는 신 형식(outings 배열) 모두 처리
        function getRecordOutings(record) {
            if (record.outings && record.outings.length) return record.outings;
            if (record.outTime) return [{ out: record.outTime, ret: record.returnTime || '' }];
            return [];
        }

        // ── 단위 변환 ──────────────────────────────────────
        const WORK_MINS_PER_DAY = 480; // 1근무일 = 8시간 = 480분
        let curUnit = 'min'; // 'min' | 'hour' | 'day'

        function setUnit(unit) {
            curUnit = unit;
            ['min','hour','day'].forEach(u => {
                document.getElementById('unit' + u.charAt(0).toUpperCase() + u.slice(1))
                    .classList.toggle('active', u === unit);
            });
            renderStats();
            renderTable();
        }

        // 분 → {min, hourStr, dayStr, chartVal, chartLabel}
        function calcDisplay(totalMin) {
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            const hourStr = h > 0 ? `${h}시간 ${m}분` : `${m}분`;
            const day = (totalMin / WORK_MINS_PER_DAY).toFixed(2);
            const chartVal = curUnit === 'min'  ? totalMin
                           : curUnit === 'hour' ? +(totalMin / 60).toFixed(2)
                           :                     +(totalMin / WORK_MINS_PER_DAY).toFixed(2);
            const chartLabel = curUnit === 'min'  ? `${totalMin}분`
                             : curUnit === 'hour' ? `${hourStr}`
                             :                     `${day}일`;
            return { totalMin, hourStr, day, chartVal, chartLabel };
        }

        // XSS 방지: 사용자 입력 데이터를 HTML에 삽입하기 전 이스케이프
        function escHtml(str) {
            if (str == null) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        // 토스트 메시지 표시 (alert 대신 사용)
        function showToast(msg, duration = 2000) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), duration);
        }

        // ──────────────────────────────────────────────────
        // 무단결근 토글
        // ──────────────────────────────────────────────────
        function toggleAbsence() {
            const checked = document.getElementById('chkAbsence').checked;
            document.getElementById('timeBox').classList.toggle('disabled', checked);
        }

        // ──────────────────────────────────────────────────
        // 다중 외출 행 관리
        // ──────────────────────────────────────────────────
        function addOutingRow(outVal = '', retVal = '') {
            const container = document.getElementById('outingsContainer');
            const idx = container.children.length;
            const row = document.createElement('div');
            row.className = 'outing-row';
            row.innerHTML = `
                <div class="time-input-group">
                    <label>외출 ${idx + 1}</label>
                    <input type="time" class="outing-out" value="${escHtml(outVal)}" aria-label="외출 ${idx + 1} 시간">
                </div>
                <div class="time-input-group">
                    <label>복귀 ${idx + 1}</label>
                    <input type="time" class="outing-ret" value="${escHtml(retVal)}" aria-label="복귀 ${idx + 1} 시간">
                </div>
                <button type="button" class="btn-remove-outing" onclick="removeOutingRow(this)" aria-label="외출 행 삭제">✕</button>
            `;
            container.appendChild(row);
            updateOutingLabels();
        }

        function removeOutingRow(btn) {
            btn.closest('.outing-row').remove();
            updateOutingLabels();
        }

        function updateOutingLabels() {
            document.querySelectorAll('#outingsContainer .outing-row').forEach((row, i) => {
                row.querySelector('.outing-out').previousElementSibling.textContent = `외출 ${i + 1}`;
                row.querySelector('.outing-ret').previousElementSibling.textContent = `복귀 ${i + 1}`;
            });
        }

        // DOM에서 외출 목록 수집
        function getOutingsFromDOM() {
            return Array.from(document.querySelectorAll('#outingsContainer .outing-row')).map(row => ({
                out: row.querySelector('.outing-out').value,
                ret: row.querySelector('.outing-ret').value
            })).filter(o => o.out || o.ret); // 둘 다 비어있는 행 제외
        }

        // ──────────────────────────────────────────────────
        // 초기화
        // ──────────────────────────────────────────────────
        window.addEventListener('load', () => {
            const list = document.getElementById('personList');
            users.forEach(u => {
                const btn = document.createElement('button');
                btn.className = 'person-btn';
                btn.textContent = u;
                btn.setAttribute('aria-pressed', 'false');
                btn.addEventListener('click', () => {
                    selPerson = u;
                    updatePersonUI();
                    loadDetail();
                });
                list.appendChild(btn);
            });

            // Firebase 실시간 리스너 등록 (참조 저장 → unload 시 해제)
            const ref = db.ref('attendance');
            dbListener = ref.on('value', snap => {
                const val = snap.val();
                allRecords = [];
                if (val) {
                    Object.values(val).forEach(personData =>
                        Object.values(personData).forEach(record => allRecords.push(record))
                    );
                }
                refresh();
            });

            // 테이블 이벤트 위임 (XSS 방지: onclick 인라인 제거)
            document.getElementById('listBody').addEventListener('click', handleTableClick);

            // 기본 외출 행 1개 추가
            addOutingRow();
        });

        // 페이지 이탈 시 Firebase 리스너 해제 (메모리 누수 방지)
        window.addEventListener('beforeunload', () => {
            if (dbListener) db.ref('attendance').off('value', dbListener);
        });

        // ──────────────────────────────────────────────────
        // UI 업데이트
        // ──────────────────────────────────────────────────
        function updatePersonUI() {
            document.querySelectorAll('.person-btn').forEach(btn => {
                const active = btn.textContent === selPerson;
                btn.classList.toggle('active', active);
                btn.setAttribute('aria-pressed', String(active));
            });
        }

        function refresh() {
            renderCalendar();
            renderStats();
            renderTable();
        }

        function changeMonth(delta) {
            curDate = new Date(curDate.getFullYear(), curDate.getMonth() + delta, 1);
            refresh();
        }

        // ──────────────────────────────────────────────────
        // 달력 렌더링
        // ──────────────────────────────────────────────────
        function renderCalendar() {
            const y = curDate.getFullYear();
            const m = curDate.getMonth();
            document.getElementById('monthLabel').textContent = `${y}년 ${m + 1}월`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            ['일', '월', '화', '수', '목', '금', '토'].forEach(d => {
                const header = document.createElement('div');
                header.style.cssText = 'text-align:center; font-size:0.7rem; color:#999;';
                header.textContent = d;
                header.setAttribute('role', 'columnheader');
                grid.appendChild(header);
            });

            const firstDow = new Date(y, m, 1).getDay();
            const lastDay = new Date(y, m + 1, 0).getDate();

            for (let i = 0; i < firstDow; i++) {
                grid.appendChild(document.createElement('div'));
            }

            for (let day = 1; day <= lastDay; day++) {
                const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const hasRecord = allRecords.some(r => r.date === dateStr);
                const dow = new Date(y, m, day).getDay();

                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                if (hasRecord) cell.classList.add('has-record');
                if (dow === 0) cell.classList.add('sun');
                if (dow === 6) cell.classList.add('sat');
                if (selDate === dateStr) cell.classList.add('selected');
                cell.textContent = day;
                cell.setAttribute('role', 'gridcell');
                cell.setAttribute('aria-label', `${m + 1}월 ${day}일${hasRecord ? ' (기록 있음)' : ''}`);
                cell.setAttribute('tabindex', '0');

                cell.addEventListener('click', () => selectDate(dateStr));
                cell.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectDate(dateStr); });

                grid.appendChild(cell);
            }
        }

        function selectDate(dateStr) {
            selDate = dateStr;
            document.getElementById('viewDate').textContent = dateStr;
            refresh();
            loadDetail();
        }

        // ──────────────────────────────────────────────────
        // 저장
        // ──────────────────────────────────────────────────
        function doSave() {
            if (!selDate || !selPerson) {
                showToast('날짜와 직원을 선택하세요!');
                return;
            }

            const isAbsence = document.getElementById('chkAbsence').checked;
            const errEl = document.getElementById('timeError');
            errEl.textContent = '';

            let missMinutes = 0;
            let saveData = {
                date: selDate,
                person: selPerson,
                notes: document.getElementById('memo').value
            };

            if (isAbsence) {
                // 무단결근: 8시간(480분) 고정
                missMinutes = 480;
                saveData = { ...saveData, absenceType: 'unauthorized', startTime: '', endTime: '', outings: [], lateMinutes: 480 };
            } else {
                const s = document.getElementById('st').value;
                const e = document.getElementById('et').value;

                ['st', 'et'].forEach(id => document.getElementById(id).classList.remove('input-error'));
                document.querySelectorAll('.outing-out, .outing-ret').forEach(el => el.classList.remove('input-error'));

                if (s && e && timeToMinutes(s) >= timeToMinutes(e)) {
                    document.getElementById('st').classList.add('input-error');
                    document.getElementById('et').classList.add('input-error');
                    errEl.textContent = '퇴근 시간이 출근 시간보다 빠를 수 없습니다.';
                    return;
                }

                // 외출 행 유효성 검사 (각 행마다)
                const rows = document.querySelectorAll('#outingsContainer .outing-row');
                for (let i = 0; i < rows.length; i++) {
                    const oEl = rows[i].querySelector('.outing-out');
                    const rEl = rows[i].querySelector('.outing-ret');
                    const o = oEl.value, r = rEl.value;
                    if (o && !r) { rEl.classList.add('input-error'); errEl.textContent = `외출 ${i+1}: 복귀 시간을 입력해주세요.`; return; }
                    if (!o && r) { oEl.classList.add('input-error'); errEl.textContent = `외출 ${i+1}: 외출 시간을 입력해주세요.`; return; }
                    if (o && r && timeToMinutes(o) >= timeToMinutes(r)) {
                        oEl.classList.add('input-error'); rEl.classList.add('input-error');
                        errEl.textContent = `외출 ${i+1}: 복귀 시간이 외출 시간보다 빠를 수 없습니다.`; return;
                    }
                }

                // 이탈 시간 계산 (다중 외출 합산)
                if (s && timeToMinutes(s) > 510) missMinutes += (timeToMinutes(s) - 510);
                if (e && timeToMinutes(e) < 1050) missMinutes += (1050 - timeToMinutes(e));

                const outings = getOutingsFromDOM();
                outings.forEach(({ out, ret }) => {
                    if (out && ret) {
                        const oMin = timeToMinutes(out), rMin = timeToMinutes(ret);
                        const lunchOverlap = Math.max(0, Math.min(rMin, 810) - Math.max(oMin, 750));
                        missMinutes += (rMin - oMin) - lunchOverlap;
                    }
                });

                saveData = { ...saveData, absenceType: '', startTime: s, endTime: e, outings: outings.length ? outings : [], lateMinutes: missMinutes };
            }

            db.ref(`attendance/${selPerson}/${selDate}`).set(saveData).then(() => {
                showToast('저장되었습니다.');
                resetForm();
            }).catch(() => {
                showToast('저장 중 오류가 발생했습니다. 다시 시도해주세요.');
            });
        }

        // 저장 후 입력 폼 초기화
        function resetForm() {
            // 무단결근 체크박스 해제
            document.getElementById('chkAbsence').checked = false;
            document.getElementById('timeBox').classList.remove('disabled');

            ['st', 'et'].forEach(id => {
                const el = document.getElementById(id);
                el.value = '';
                el.classList.remove('input-error');
            });
            // 외출 행 초기화 (1개 빈 행으로 리셋)
            document.getElementById('outingsContainer').innerHTML = '';
            addOutingRow();
            document.getElementById('memo').value = '';
            document.getElementById('timeError').textContent = '';
            selDate = null;
            selPerson = '';
            document.getElementById('viewDate').textContent = '날짜 선택';
            updatePersonUI();
            refresh();
        }

        // ──────────────────────────────────────────────────
        // 통계 렌더링
        // ──────────────────────────────────────────────────
        function renderStats() {
            const totals = users.map(u =>
                allRecords.filter(r => r.person === u).reduce((acc, cur) => acc + (cur.lateMinutes || 0), 0)
            );

            const summaryBox = document.getElementById('summaryBox');
            summaryBox.innerHTML = '';
            users.forEach((u, i) => {
                const d = calcDisplay(totals[i]);
                const card = document.createElement('div');
                card.className = 'summary-card' + (filterName === u ? ' active' : '');
                card.setAttribute('role', 'button');
                card.setAttribute('tabindex', '0');
                card.setAttribute('aria-pressed', String(filterName === u));
                card.setAttribute('aria-label', `${u} ${d.totalMin}분 (${d.hourStr} / 연차 ${d.day}일) 필터`);

                card.innerHTML = `
                    <h3>${escHtml(u)}</h3>
                    <div class="score-min">${d.totalMin}분</div>
                    <div class="score-hour">${d.hourStr}</div>
                    <div class="score-day">연차 ${d.day}일</div>
                `;

                card.addEventListener('click', () => setFilter(u));
                card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') setFilter(u); });
                summaryBox.appendChild(card);
            });

            const chartVals = totals.map(t => calcDisplay(t).chartVal);
            const yLabel = curUnit === 'min' ? '분' : curUnit === 'hour' ? '시간' : '일(연차)';

            const ctx = document.getElementById('barChart').getContext('2d');
            if (chartObj) chartObj.destroy();
            chartObj = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: users,
                    datasets: [{ data: chartVals, backgroundColor: '#667eea', borderRadius: 5 }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => {
                                    const d = calcDisplay(totals[ctx.dataIndex]);
                                    return [`${d.totalMin}분`, d.hourStr, `연차 ${d.day}일`];
                                }
                            }
                        }
                    },
                    scales: {
                        y: { title: { display: true, text: yLabel, font: { size: 11 } } }
                    }
                }
            });
        }

        function setFilter(name) {
            filterName = (filterName === name) ? '' : name;
            document.getElementById('curFilter').textContent = filterName ? `(${filterName} 필터 중)` : '';
            renderStats();
            renderTable();
        }

        // ──────────────────────────────────────────────────
        // 기록 목록 렌더링 (XSS 방지: 이스케이프 적용)
        // ──────────────────────────────────────────────────
        function renderTable() {
            const target = filterName
                ? allRecords.filter(r => r.person === filterName)
                : allRecords;

            const sorted = target.slice().sort((a, b) => b.date.localeCompare(a.date));
            const tbody = document.getElementById('listBody');
            tbody.innerHTML = '';

            sorted.forEach(r => {
                const tr = document.createElement('tr');
                // data 속성으로 날짜/직원 저장 (onclick 인라인 제거 → XSS 방지)
                tr.dataset.date = r.date;
                tr.dataset.person = r.person;

                const totalMin = r.lateMinutes || 0;
                const d = calcDisplay(totalMin);
                const isAbsence = r.absenceType === 'unauthorized';
                const outingsText = isAbsence
                    ? '<span class="badge-absence">무단결근</span>'
                    : (getRecordOutings(r)
                        .filter(o => o.out)
                        .map(o => `${escHtml(o.out)}~${escHtml(o.ret || '?')}`)
                        .join('<br>') || '-');
                const lateCell = totalMin > 0
                    ? `<td class="late-detail">
                           <span class="d-min">${totalMin}분</span>${isAbsence ? ' <span class="badge-absence">무단결근</span>' : ''}<br>
                           <span class="d-hour">${d.hourStr}</span><br>
                           <span class="d-day">연차 ${d.day}일</span>
                       </td>`
                    : `<td>-</td>`;
                tr.innerHTML = `
                    <td>${escHtml(r.date)}</td>
                    <td>${escHtml(r.person)}</td>
                    <td>${escHtml(r.startTime) || '-'}</td>
                    <td>${escHtml(r.endTime) || '-'}</td>
                    <td>${outingsText}</td>
                    ${lateCell}
                    <td class="td-notes" data-date="${escHtml(r.date)}" data-person="${escHtml(r.person)}" title="클릭하여 비고 수정">${escHtml(r.notes) || '<span style="color:#ccc">메모</span>'}</td>
                    <td><button class="btn-del" data-date="${escHtml(r.date)}" data-person="${escHtml(r.person)}" aria-label="${escHtml(r.date)} ${escHtml(r.person)} 기록 삭제">삭제</button></td>
                `;
                tbody.appendChild(tr);
            });
        }

        // 테이블 이벤트 위임 처리
        function handleTableClick(e) {
            const delBtn = e.target.closest('.btn-del');
            if (delBtn) {
                e.stopPropagation();
                const { date, person } = delBtn.dataset;
                if (confirm(`[${person}] ${date} 기록을 삭제하시겠습니까?`)) {
                    db.ref(`attendance/${person}/${date}`).remove()
                        .then(() => showToast('삭제되었습니다.'))
                        .catch(() => showToast('삭제 중 오류가 발생했습니다.'));
                }
                return;
            }

            // 비고 인라인 편집
            const notesTd = e.target.closest('.td-notes');
            if (notesTd && !notesTd.querySelector('input')) {
                e.stopPropagation();
                const { date, person } = notesTd.dataset;
                const record = allRecords.find(x => x.date === date && x.person === person);
                const currentVal = record?.notes || '';

                const input = document.createElement('input');
                input.type = 'text';
                input.value = currentVal;
                notesTd.innerHTML = '';
                notesTd.appendChild(input);
                input.focus();

                function saveNotes() {
                    const newVal = input.value.trim();
                    if (newVal === currentVal) { renderTable(); return; }
                    db.ref(`attendance/${person}/${date}`).update({ notes: newVal })
                        .then(() => showToast('비고 저장됨'))
                        .catch(() => showToast('저장 오류'));
                }
                input.addEventListener('blur', saveNotes);
                input.addEventListener('keydown', e => {
                    if (e.key === 'Enter') { input.blur(); }
                    if (e.key === 'Escape') { renderTable(); }
                });
                return;
            }

            const row = e.target.closest('tr');
            if (row && row.dataset.date) {
                selDate = row.dataset.date;
                selPerson = row.dataset.person;
                document.getElementById('viewDate').textContent = selDate;
                updatePersonUI();
                loadDetail();
                refresh();
            }
        }

        // ──────────────────────────────────────────────────
        // 상세 데이터 로드
        // ──────────────────────────────────────────────────
        function loadDetail() {
            const record = allRecords.find(x => x.date === selDate && x.person === selPerson);

            // 무단결근 여부 복원
            const isAbsence = record?.absenceType === 'unauthorized';
            document.getElementById('chkAbsence').checked = isAbsence;
            document.getElementById('timeBox').classList.toggle('disabled', isAbsence);

            document.getElementById('st').value = record?.startTime || '';
            document.getElementById('et').value = record?.endTime || '';
            document.getElementById('memo').value = record?.notes || '';

            // 외출 행 복원 (구 형식/신 형식 모두 처리)
            document.getElementById('outingsContainer').innerHTML = '';
            const outings = record ? getRecordOutings(record) : [];
            if (outings.length > 0) {
                outings.forEach(o => addOutingRow(o.out, o.ret));
            } else {
                addOutingRow(); // 빈 행 1개
            }

            document.getElementById('timeError').textContent = '';
            ['st', 'et'].forEach(id => document.getElementById(id).classList.remove('input-error'));
        }
    </script>
</body>
</html>
